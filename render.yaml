services:
  # Servicio Web para la aplicación Node.js (Plan Gratuito de Render)
  - type: web
    name: soporteia-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: "3000"
      - key: AUTH_ALLOW_ANONYMOUS
        value: "true"


