services:
  # Servicio Web para la aplicación Node.js
  - type: web
    name: soporteia-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: "3000"
      - key: AUTH_ALLOW_ANONYMOUS
        value: "true"
      - key: CHROMA_URL
        value: http://chromadb-service:8000
      - key: OLLAMA_BASE_URL
        value: http://ollama-service:11434

  # Servicio Privado para la base de datos vectorial ChromaDB
  - type: pserv
    name: chromadb-service
    runtime: image
    image:
      url: docker.io/chromadb/chroma:latest
    envVars:
      - key: IS_PERSISTENT
        value: "TRUE"
      - key: PERSIST_DIRECTORY
        value: /chroma/chroma
      - key: ANONYMIZED_TELEMETRY
        value: "FALSE"

  # Servicio Privado para Ollama (¡Atención: Requiere plan de pago con alta RAM en Render!)
  - type: pserv
    name: ollama-service
    runtime: image
    image:
      url: docker.io/ollama/ollama:latest

