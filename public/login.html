<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoporteIA - Iniciar Sesión</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      width: 100%;
      max-width: 420px;
      padding: 40px 30px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      text-align: center;
    }
    .auth-logo {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a5b4fc 0%, #6366f1 50%, #10b981 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .auth-card h2 {
      font-size: 1.4rem;
      margin-bottom: 25px;
      color: var(--text-primary);
      font-weight: 600;
    }
    .auth-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
      background: rgba(255, 255, 255, 0.03);
      padding: 6px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
    }
    .auth-tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      border-radius: 8px;
      transition: var(--transition-smooth);
    }
    .auth-tab-btn.active {
      background: var(--color-primary);
      color: #fff;
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
      text-align: left;
    }
    .auth-form label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 500;
      margin-bottom: 5px;
      display: block;
    }
    .auth-form input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      background: rgba(30, 41, 59, 0.3);
      color: var(--text-primary);
      font-size: 0.95rem;
      outline: none;
      transition: var(--transition-smooth);
    }
    .auth-form input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 10px rgba(99, 102, 241, 0.15);
    }
    .auth-btn {
      width: 100%;
      padding: 14px;
      border: none;
      background: var(--color-primary);
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
      border-radius: 12px;
      cursor: pointer;
      transition: var(--transition-smooth);
      margin-top: 10px;
    }
    .auth-btn:hover {
      background: var(--color-primary-hover);
    }
    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .password-wrapper input {
      width: 100%;
      padding-right: 48px;
    }
    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: color 0.2s ease;
    }
    .toggle-password:hover {
      color: var(--color-primary);
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">SoporteIA</div>
    <h2 id="authTitle">Iniciar Sesión</h2>
    
    <div class="auth-tabs">
      <button id="tabLogin" class="auth-tab-btn active" onclick="switchTab('login')">Ingresar</button>
      <button id="tabRegister" class="auth-tab-btn" onclick="switchTab('register')">Registrarse</button>
    </div>

    <form id="authForm" onsubmit="handleAuth(event)" class="auth-form">
      <div>
        <label for="emailInput">Correo Electrónico</label>
        <input type="email" id="emailInput" placeholder="correo@ejemplo.com" required>
      </div>
      <div>
        <label for="passwordInput">Contraseña</label>
        <div class="password-wrapper">
          <input type="password" id="passwordInput" placeholder="••••••••" required>
          <button type="button" class="toggle-password" id="togglePasswordBtn" onclick="togglePasswordVisibility()" title="Mostrar / Ocultar contraseña" aria-label="Mostrar contraseña">
            <svg id="icon-eye" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" id="submitBtn" class="auth-btn">Ingresar al Sistema</button>
      <button type="button" onclick="window.location.href='../../nosotros.html'" class="auth-btn" style="background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border-color); color: var(--text-secondary); margin-top: 12px; transition: all 0.3s ease;" onmouseover="this.style.background='rgba(255,255,255,0.08)'; this.style.color='#fff';" onmouseout="this.style.background='rgba(255,255,255,0.04)'; this.style.color='var(--text-secondary)';">
        Info
      </button>
    </form>
  </div>

  <script>
    let activeTab = 'login';

    function togglePasswordVisibility() {
      const input = document.getElementById('passwordInput');
      const iconEye = document.getElementById('icon-eye');
      const iconEyeOff = document.getElementById('icon-eye-off');
      const btn = document.getElementById('togglePasswordBtn');

      if (input.type === 'password') {
        input.type = 'text';
        iconEye.style.display = 'none';
        iconEyeOff.style.display = 'block';
        btn.setAttribute('aria-label', 'Ocultar contraseña');
      } else {
        input.type = 'password';
        iconEye.style.display = 'block';
        iconEyeOff.style.display = 'none';
        btn.setAttribute('aria-label', 'Mostrar contraseña');
      }
    }

    function switchTab(tab) {
      activeTab = tab;
      const title = document.getElementById('authTitle');
      const submitBtn = document.getElementById('submitBtn');
      const tabLogin = document.getElementById('tabLogin');
      const tabRegister = document.getElementById('tabRegister');
      
      tabLogin.classList.remove('active');
      tabRegister.classList.remove('active');

      if (tab === 'login') {
        tabLogin.classList.add('active');
        title.innerText = 'Iniciar Sesión';
        submitBtn.innerText = 'Ingresar al Sistema';
      } else {
        tabRegister.classList.add('active');
        title.innerText = 'Crear Nueva Cuenta';
        submitBtn.innerText = 'Registrarse y Comenzar';
      }
    }

    function handleAuth(event) {
      event.preventDefault();
      const email = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passwordInput').value;

      if (!email || !password) return;

      const users = JSON.parse(localStorage.getItem('users_db') || '[]');

      if (activeTab === 'login') {
        const user = users.find(u => u.email.toLowerCase() === email.toLowerCase());
        if (!user || user.password !== password) {
          alert('Credenciales incorrectas. Intenta nuevamente.');
          return;
        }

        localStorage.setItem('current_user', user.email);

        window.location.replace('index.html');
      } else {
        const exists = users.some(u => u.email.toLowerCase() === email.toLowerCase());
        if (exists) {
          alert('Este correo ya se encuentra registrado.');
          return;
        }

        const newUser = {
          email: email,
          password: password,
          sub_docs: false,
          sub_diag: false,
          sub_premium: false,
          first_purchase_done: false
        };
        users.push(newUser);
        localStorage.setItem('users_db', JSON.stringify(users));

        localStorage.setItem('current_user', newUser.email);
        alert('Cuenta creada exitosamente. Redirigiendo...');

        window.location.replace('index.html');
      }
    }

    if (localStorage.getItem('current_user')) {
      window.location.replace('index.html');
    }
  </script>
</body>
</html>
